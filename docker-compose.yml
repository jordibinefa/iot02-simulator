services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot02sim-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - iot02sim-net

  iot02sim:
    build: .
    container_name: iot02sim
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - ENABLE_VNC=${ENABLE_VNC:-false}
      - MQTT_BRIDGE_URL=mqtt://iot02sim-mosquitto:1883
      - MQTT_BROKER_HOST=iot02sim-mosquitto
      - MQTT_BROKER_PORT=1883
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iot02sim.rule=Host(`iot02sim.binefa.cat`)"
      - "traefik.http.routers.iot02sim.entrypoints=https"
      - "traefik.http.routers.iot02sim.tls.certresolver=letsencrypt"
      - "traefik.http.services.iot02sim.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.iot02sim-headers.headers.customrequestheaders.Connection=Upgrade"
      - "traefik.http.routers.iot02sim.middlewares=iot02sim-headers,cors-headers@file"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "6"
    volumes:
      - ./backend/QemuManager.js:/app/QemuManager.js
      - ./backend/server.js:/app/server.js
      - ./backend/MqttBridge.js:/app/MqttBridge.js
      - ./backend/package.json:/app/package.json
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/css:/app/frontend/css
      - ./frontend/js:/app/frontend/js
      - ./frontend/imatges:/app/frontend/imatges
      - ./qemu-devices/ethernet_shim:/app/ethernet_shim
      - iot02sim-cache:/app/cache
      - iot02sim-firmware:/app/firmware
    networks:
      - iot02sim-net

volumes:
  iot02sim-cache:
  iot02sim-firmware:

networks:
  iot02sim-net:

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot02sim-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - iot02sim-net

  iot02sim:
    image: jordibinefa/iot02sim:latest
    container_name: iot02sim
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - ENABLE_VNC=${ENABLE_VNC:-false}
      - MQTT_BROKER_USER=ecat
      - MQTT_BROKER_PASS=clotClot
      - MQTT_BRIDGE_URL=mqtt://mosquitto:1883
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
    ports:
      - "5555:3000"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    volumes:
      - iot02sim-cache:/app/cache
      - iot02sim-firmware:/app/firmware
    networks:
      - iot02sim-net

volumes:
  iot02sim-cache:
  iot02sim-firmware:

networks:
  iot02sim-net:

<head>

<!-- =====================================================================
     Estructura principal — Layout dual
     Columna esquerra: foto placa IoT-02 amb components interactius
     Columna dreta: compilació + Serial Monitor
     ===================================================================== -->
<div id="app">

    <!-- Barra d'eines -->
    <div id="toolbar">
        <span class="app-title">ESP32 Simulator — IoT-02</span>
        <div class="toolbar-separator"></div>
        <div class="toolbar-status">
            <span class="status-dot disconnected" id="conn-indicator"></span>
            <span id="conn-text" data-i18n="connDisconnected">Desconnectat</span>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-status">
            <span data-i18n="labelMac">MAC:</span>
            <input class="toolbar-mac" id="mac-display" type="text" value="—"
                   data-i18n-title="macTitle">
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-status">
            <span data-i18n="labelId">ID:</span>
            <code class="toolbar-session-id" id="session-id-display"
                  data-i18n-title="sessionIdTitle">—</code>
            <button class="toolbar-copy-btn" id="btn-copy-session"
                    data-i18n-title="sessionIdTitle"
                    data-i18n="btnCopySession">⎘</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-status">
            <span class="status-label" data-i18n="labelSessions">Sessions:</span>
            <span id="capacity-display">—</span>
        </div>
        <div class="toolbar-spacer"></div>
        <span class="toolbar-status" style="font-size:11px; color:#565f89;">
            Core: <code>esp32@0.3.1</code>
        </span>
        <button id="btn-settings" data-i18n-title="titleSettings"
                data-i18n="btnSettings">⚙</button>
    </div>

    <!-- Àrea principal: placa + panell -->
    <div id="main-area">

        <!-- Columna esquerra: foto de la placa -->
        <div id="board-container">
            <img id="board-image"
                 src="imatges/IoT-02.png"
                 alt="Placa IoT-02">
            <!-- Els components interactius (LEDs, botons, BME280, LDR, OLED)
                 s'injecten aquí via createBoardComponents() -->
        </div>

        <!-- Columna dreta: panell de control -->
        <div id="control-panel">

            <!-- Secció compilació + accions -->
            <div id="compile-section">
                <h2 data-i18n="uploadTitle">📦 Compilació</h2>
                <div class="upload-zone" id="upload-zone">
                    <span class="icon" data-i18n="uploadIcon">📁</span>
                    <p data-i18n-html="uploadHint">Arrossega aquí el <strong>ZIP del projecte</strong>,
                       un <strong>ZIP amb binaris</strong> o un <strong>.bin merged</strong></p>
                    <p style="font-size:11px; color:var(--fg-muted); margin-top:4px;"
                       data-i18n="uploadHint2">
                       ZIP binaris: *.ino.bin + bootloader + partitions · BIN merged: 4MB flash image
                    </p>
                    <input type="file" id="file-input" accept=".zip,.bin">
                </div>
                <div id="compile-status"></div>
                <div class="actions-row">
                    <button class="btn" id="btn-compile" disabled
                            data-i18n="btnCompile">Compila / Carrega</button>
                    <button class="btn btn-green" id="btn-start" disabled
                            data-i18n="btnStart">▶ Inicia QEMU</button>
                    <button class="btn btn-red" id="btn-stop" disabled
                            data-i18n="btnStop">⬛ Atura</button>
                    <a class="btn btn-small" id="btn-download"
                       style="display:none; text-decoration:none;"
                       data-i18n="btnDownload">⬇ .bin</a>
                </div>
            </div>

            <!-- Secció Serial Monitor -->
            <div id="serial-section">
                <h2 data-i18n="serialTitle">🖥️ Serial Monitor (115200 baud)</h2>
                <div id="serial-output"></div>
                <div class="serial-input-row">
                    <input type="text" id="serial-input"
                           data-i18n-placeholder="serialPlaceholder"
                           placeholder="Tramet al Serial...">
                    <button class="btn btn-small" id="btn-serial-send"
                            data-i18n="btnSerialSend">Tramet</button>
                    <button class="btn btn-small" id="btn-serial-clear"
                            style="background:var(--border); color:var(--fg);"
                            data-i18n="btnSerialClear">Neteja</button>
                </div>
            </div>

        </div><!-- fi #control-panel -->

    </div><!-- fi #main-area -->

</div><!-- fi #app -->

     JavaScript — Idioma actiu

<!-- =====================================================================
     JavaScript — Mòduls externs
     ===================================================================== -->
<script src="js/SettingsManager.js"></script>
<script src="js/SimulatorTransport.js"></script>
<script src="js/ConfigPage.js"></script>
<script src="js/components/InteractiveButton.js"></script>
<script src="js/components/InteractiveLed.js"></script>

<!-- =====================================================================
     JavaScript — Lògica del simulador
     ===================================================================== -->
<script>
// Aplica les traduccions estàtiques al DOM
applyTranslations();

// ─── Polyfill: crypto.randomUUID per a contextos HTTP (sense TLS) ───
// crypto.randomUUID() només funciona en contextos segurs (HTTPS / localhost).
// En HTTP directe per IP, usem crypto.getRandomValues() que sí és disponible.
if (typeof crypto.randomUUID !== 'function') {
    crypto.randomUUID = function() {
        const b = crypto.getRandomValues(new Uint8Array(16));
        b[6] = (b[6] & 0x0f) | 0x40; // versió 4
        b[8] = (b[8] & 0x3f) | 0x80; // variant RFC 4122
        const h = Array.from(b).map(x => x.toString(16).padStart(2, '0'));
        return h.slice(0,4).join('')+'-'+h.slice(4,6).join('')+'-'+h.slice(6,8).join('')+'-'+h.slice(8,10).join('')+'-'+h.slice(10).join('');
    };
}

// ─── State ───
let ws           = null;
let sessionId    = localStorage.getItem('esp32sim_sessionId') || crypto.randomUUID();
let elfHash      = null;
let mac          = localStorage.getItem('esp32sim_mac') || null;
let selectedFile = null;

localStorage.setItem('esp32sim_sessionId', sessionId);

// ─── Instàncies globals ───
const settingsManager    = new SettingsManager();
const simulatorTransport = new SimulatorTransport();

// ─── Components de la placa (es creen a onBoardImageLoaded) ───
let boardComponents = [];

// ─── DOM refs ───
const $ = id => document.getElementById(id);
const serialOutput    = $('serial-output');
const compileStatus   = $('compile-status');
const connIndicator   = $('conn-indicator');
const connText        = $('conn-text');
const macDisplay      = $('mac-display');
const capacityDisplay = $('capacity-display');
const sessionIdDisplay = $('session-id-display');
const btnCopySession   = $('btn-copy-session');

// ─── ConfigPage ───
const configPage = new ConfigPage($('app'), {
    settingsManager,
    onSaved: () => {
        macDisplay.value = settingsManager.mqttMac;
        mac = settingsManager.mqttMac;
        localStorage.setItem('esp32sim_mac', mac);
    },
});

$('btn-settings').addEventListener('click', () => configPage.show());

// ─── File upload ───
const uploadZone = $('upload-zone');
const fileInput  = $('file-input');

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
    selectedFile = file;
    const isBin = file.name.toLowerCase().endsWith('.bin');
    const icon = uploadZone.querySelector('.icon');
    const p    = uploadZone.querySelector('p');
    if (icon) icon.textContent = '✅';
    if (p) p.innerHTML = `${file.name} (${(file.size / 1024).toFixed(1)} KB)${isBin ? ' — BIN' : ''}`;
    $('btn-compile').disabled = false;
    $('btn-compile').textContent = T.btnCompile;
    compileStatus.textContent = '';
}

// ─── Helper: mostrar estat de compilació (amb spinner opcional) ───
function setCompileStatus(text, color, showSpinner = false) {
    compileStatus.innerHTML = showSpinner
        ? `<span class="spinner"></span> ${text}`
        : text;
    compileStatus.style.color = color || 'var(--fg-muted)';
}

// =====================================================================
// ─── initFromHash() — càrrega de firmware des del hash de la URL ─────
// =====================================================================
async function initFromHash() {
    const hash = location.hash;
    if (!hash || hash.length < 2) return;

    const openMatch = hash.match(/^#(open|run):(.+)$/i);
    if (!openMatch) return;

    const mode      = openMatch[1].toLowerCase();
    const paramsRaw = openMatch[2];

    history.replaceState(null, '', location.pathname);

    let params;
    try {
        params = new URLSearchParams(paramsRaw);
    } catch {
        setCompileStatus(T.errHashFormat, 'var(--red)');
        return;
    }

    // ── sid= ──
    const sidParam = params.get('sid');
    if (sidParam) {
        const sidClean = sidParam.trim();
        if (sidClean.length > 0 && !/[\/+#]/.test(sidClean)) {
            sessionId = sidClean;
            localStorage.setItem('esp32sim_sessionId', sessionId);
            if (sessionIdDisplay) {
                const short = sessionId.length > 8 ? sessionId.substring(0, 8) + '…' : sessionId;
                sessionIdDisplay.textContent = short;
                sessionIdDisplay.title = `${T.sessionIdFull} ${sessionId}\n${T.sessionIdMqtt.replace('{id}', sessionId)}`;
            }
        } else {
            setCompileStatus(T.errSidInvalid, 'var(--yellow)');
        }
    }

    // ── MAC ──
    const macParam = params.get('mac');
    if (macParam) {
        const macClean = macParam.trim().toUpperCase().replace(/:/g, '');
        if (/^[0-9A-F]{12}$/.test(macClean)) {
            mac = macClean;
            localStorage.setItem('esp32sim_mac', mac);
            macDisplay.value = mac;
            settingsManager.mqttMac = mac;
        } else {
            setCompileStatus(T.errMacInvalid, 'var(--yellow)');
        }
    }

    const binUrl  = params.get('bin');
    const codeUrl = params.get('code');
    if (!binUrl && !codeUrl) return;

    const autoStart = (mode === 'run');
    if (binUrl) {
        await _hashLoadBin(binUrl, autoStart);
    } else {
        await _hashLoadCode(codeUrl, autoStart);
    }
}

async function _hashLoadBin(url, autoStart) {
    setCompileStatus(T.statusLoadingBin, 'var(--yellow)', true);

    let blob;
    try {
        blob = await _proxyFetch(url);
    } catch (err) {
        setCompileStatus(`${T.errFetch} ${err.message}`, 'var(--red)');
        return;
    }

    const urlPath  = url.split('?')[0];
    const fileName = urlPath.split('/').pop() || 'firmware.bin';
    const file     = new File([blob], fileName, { type: 'application/octet-stream' });

    _updateUploadZoneUI(file);
    setCompileStatus(T.statusUploadingBin, 'var(--yellow)', true);

    const formData = new FormData();
    formData.append('firmware', file);

    let data;
    try {
        const resp = await fetch('/upload-bin', {
            method: 'POST',
            headers: { 'X-Session-Id': sessionId },
            body: formData,
        });
        data = await resp.json();
    } catch (err) {
        setCompileStatus(`${T.errUpload} ${err.message}`, 'var(--red)');
        return;
    }

    if (!data.success) {
        setCompileStatus(`❌ ${data.message}`, 'var(--red)');
        return;
    }

    elfHash = data.elfHash;
    setCompileStatus(T.statusBinReady, 'var(--green)');
    $('btn-start').disabled = false;
    $('btn-download').style.display = 'inline-block';
    $('btn-download').href = `/firmware/${elfHash}/download`;

    if (autoStart) {
        await _sleep(400);
        $('btn-start').click();
    }
}

async function _hashLoadCode(url, autoStart) {
    setCompileStatus(T.statusLoadingCode, 'var(--yellow)', true);

    let blob;
    try {
        blob = await _proxyFetch(url);
    } catch (err) {
        setCompileStatus(`${T.errFetch} ${err.message}`, 'var(--red)');
        return;
    }

    const urlPath  = url.split('?')[0];
    const fileName = urlPath.split('/').pop() || 'project.zip';
    const file     = new File([blob], fileName, { type: 'application/zip' });

    _updateUploadZoneUI(file);
    setCompileStatus(T.statusCompiling, 'var(--yellow)', true);

    const formData = new FormData();
    formData.append('project', file);

    let data;
    try {
        const resp = await fetch('/compile', {
            method: 'POST',
            headers: { 'X-Session-Id': sessionId },
            body: formData,
        });
        data = await resp.json();
    } catch (err) {
        setCompileStatus(`${T.errCompile} ${err.message}`, 'var(--red)');
        return;
    }

    if (!data.success) {
        setCompileStatus(`❌ ${data.message}`, 'var(--red)');
        return;
    }

    elfHash = data.elfHash;
    setCompileStatus(
        data.cached ? T.statusCached : T.statusOk,
        'var(--green)'
    );
    $('btn-start').disabled = false;
    $('btn-download').style.display = 'inline-block';
    $('btn-download').href = `/firmware/${elfHash}/download`;

    if (autoStart) {
        await _sleep(400);
        $('btn-start').click();
    }
}

async function _proxyFetch(url) {
    const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(30_000) });
    if (!resp.ok) {
        let msg = `HTTP ${resp.status}`;
        try {
            const errData = await resp.json();
            if (errData.error) msg = errData.error;
        } catch { /* ignora */ }
        throw new Error(msg);
    }
    return resp.blob();
}

function _updateUploadZoneUI(file) {
    const isBin = file.name.toLowerCase().endsWith('.bin');
    const icon  = uploadZone.querySelector('.icon');
    const p     = uploadZone.querySelector('p');
    if (icon) icon.textContent = '🔗';
    if (p) p.innerHTML = `${file.name} (${(file.size / 1024).toFixed(1)} KB)${isBin ? ' — BIN' : ''}`;
}

function _sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// ─── Compile / Carregar ───
$('btn-compile').addEventListener('click', async () => {
    if (!selectedFile) return;
    $('btn-compile').disabled = true;
    setCompileStatus(T.statusProcessing, 'var(--yellow)', true);

    const formData = new FormData();
    const isBin = selectedFile.name.toLowerCase().endsWith('.bin');
    formData.append(isBin ? 'firmware' : 'project', selectedFile);

    try {
        const endpoint = isBin ? '/upload-bin' : '/compile';
        const resp = await fetch(endpoint, {
            method: 'POST',
            headers: { 'X-Session-Id': sessionId },
            body: formData,
        });
        const data = await resp.json();

        if (data.success) {
            elfHash = data.elfHash;
            setCompileStatus(
                data.cached ? T.statusCached : `✅ ${data.message}`,
                'var(--green)'
            );
            $('btn-start').disabled = false;
            $('btn-download').style.display = 'inline-block';
            $('btn-download').href = `/firmware/${elfHash}/download`;
        } else {
            setCompileStatus(`❌ ${data.message}`, 'var(--red)');
        }
    } catch (err) {
        setCompileStatus(`${T.errGeneric} ${err.message}`, 'var(--red)');
    }
    $('btn-compile').disabled = false;
});

// ─── Start QEMU ───
$('btn-start').addEventListener('click', async () => {
    if (!elfHash) return;
    $('btn-start').disabled = true;
    setCompileStatus(T.statusStarting, 'var(--yellow)', true);

    try {
        const resp = await fetch(`/session/${sessionId}/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ elfHash, mac: macDisplay.value.trim() || undefined }),
        });
        const data = await resp.json();

        if (data.success) {
            mac = data.mac;
            localStorage.setItem('esp32sim_mac', mac);
            macDisplay.value = mac;
            setCompileStatus(T.statusStarted, 'var(--green)');
            $('btn-stop').disabled = false;
            connectWebSocket();
        } else {
            setCompileStatus(`❌ ${data.message}`, 'var(--red)');
            $('btn-start').disabled = false;
        }
    } catch (err) {
        setCompileStatus(`${T.errGeneric} ${err.message}`, 'var(--red)');
        $('btn-start').disabled = false;
    }
});

// ─── Stop QEMU ───
$('btn-stop').addEventListener('click', async () => {
    try {
        await fetch(`/session/${sessionId}`, { method: 'DELETE' });
    } catch (_) { /* ignora */ }
    if (ws) ws.close();
    simulatorTransport.detachWebSocket();
    $('btn-stop').disabled = true;
    $('btn-start').disabled = false;
    setConnectionStatus('disconnected', T.connDisconnected);
});

// ─── WebSocket ───
function connectWebSocket() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/session/${sessionId}/ws`);

    setConnectionStatus('connecting', T.connConnecting);

    ws.onopen = () => {
        setConnectionStatus('connected', T.connConnected);
        simulatorTransport.attachWebSocket(ws);
        // Keepalive cada 60s
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'keepalive' }));
            }
        }, 60_000);
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleWsMessage(msg);
    };

    ws.onclose = () => {
        setConnectionStatus('disconnected', T.connDisconnected);
        simulatorTransport.detachWebSocket();
    };

    ws.onerror = () => {
        setConnectionStatus('disconnected', T.connError);
    };
}

function handleWsMessage(msg) {
    switch (msg.type) {
        case 'serial':
            appendSerial(msg.data);
            break;
        case 'gpio':
            simulatorTransport.handleGpioMessage(msg.pin, msg.value);
            break;
        case 'oled':
            simulatorTransport.handleOledMessage(msg.framebuffer);
            break;
        case 'session':
            if (!mac) {
                mac = msg.mac;
                macDisplay.value = mac;
                localStorage.setItem('esp32sim_mac', mac);
            }
            break;
        case 'capacity':
            capacityDisplay.textContent = msg.used + '/' + msg.max;
            break;
        case 'timeout_warning':
            appendSerial(T.sessionTimeout.replace('{s}', msg.seconds));
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'keepalive' }));
            }
            break;
        case 'session_end':
            appendSerial(T.sessionEnd + (msg.reason || T.sessionEndUnknown) + '\n');
            setConnectionStatus('disconnected', T.sessionEnded);
            simulatorTransport.detachWebSocket();
            $('btn-stop').disabled = true;
            $('btn-start').disabled = false;
            break;
        case 'monitor_ready':
            // Delay 1500ms per donar temps a QEMU d'inicialitzar els perifèrics
            setTimeout(() => simulatorTransport.sendCurrentSensorValues(), 1500);
            break;
        case 'button_state': {
            const pinMap = { 0: 'btIO0', 34: 'btI34', 35: 'btI35' };
            const mqttName = pinMap[msg.pin];
            if (mqttName) {
                const btn = boardComponents.find(c => c instanceof InteractiveButton && c._mqttName === mqttName);
                if (btn) btn.setPressed(msg.value === 1);
            }
            break;
        }
        case 'ldr_state': {
            const ldr = boardComponents.find(c => c instanceof InteractiveLdr);
            if (ldr) ldr.setExternalValue(msg.value);
            break;
        }
        case 'bme_state': {
            const bme = boardComponents.find(c => c instanceof InteractiveBme280);
            if (bme) bme.setExternalValues({ temp: msg.temp, rh: msg.rh, pressure: msg.pressure });
            break;
        }
        case 'status':
            appendSerial('[INFO] ' + msg.message + '\n');
            break;
    }
}

// ─── Serial Monitor ───
function appendSerial(text) {
    serialOutput.textContent += text;
    serialOutput.scrollTop = serialOutput.scrollHeight;
    // Limitar a 50KB per evitar consum de memòria
    if (serialOutput.textContent.length > 50000) {
        serialOutput.textContent = serialOutput.textContent.slice(-30000);
    }
}

$('btn-serial-clear').addEventListener('click', () => { serialOutput.textContent = ''; });

$('btn-serial-send').addEventListener('click', () => {
    const input = $('serial-input');
    if (input.value && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'serial_input', data: input.value + '\n' }));
        input.value = '';
    }
});

$('serial-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') $('btn-serial-send').click();
});

// ─── Helpers ───
function setConnectionStatus(cssClass, text) {
    connIndicator.className = `status-dot ${cssClass}`;
    connText.textContent    = text;
}

// ─── Init MAC ───
if (!mac) {
    const b = Array.from(crypto.getRandomValues(new Uint8Array(6)));
    b[0] = (b[0] & 0xfe) | 0x02; // Unicast + locally administered
    mac = b.map(x => x.toString(16).toUpperCase().padStart(2, '0')).join('');
    localStorage.setItem('esp32sim_mac', mac);
}
macDisplay.value = mac;
settingsManager.mqttMac = mac;

// ─── Init Session ID display ───
if (sessionIdDisplay) {
    sessionIdDisplay.textContent = sessionId.substring(0, 8) + '…';
    sessionIdDisplay.title = `${T.sessionIdFull} ${sessionId}\n${T.sessionIdMqtt.replace('{id}', sessionId)}`;
}
if (btnCopySession) {
    btnCopySession.addEventListener('click', () => {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(sessionId).then(() => {
                btnCopySession.textContent = T.btnCopyDone;
                setTimeout(() => { btnCopySession.textContent = T.btnCopySession; }, 1500);
            }).catch(() => {
                prompt(T.sessionIdPrompt, sessionId);
            });
        } else {
            prompt(T.sessionIdPrompt, sessionId);
        }
    });
}

// Sincronitza l'edició manual de la MAC a la toolbar
macDisplay.addEventListener('change', () => {
    const v = macDisplay.value.trim().toUpperCase().replace(/:/g, '');
    if (/^[0-9A-F]{12}$/.test(v)) {
        mac = v;
        localStorage.setItem('esp32sim_mac', mac);
        settingsManager.mqttMac = mac;
    } else {
        macDisplay.value = mac;
    }
});

// ─── Components interactius sobre la placa ───
const LED_GPIO_LABELS = {
    ledW: 'GPIO 19',
    ledR: 'GPIO 23',
    ledY: 'GPIO 27',
    ledG: 'GPIO 32',
};

const BOARD_COMPONENTS_DEFS = [
    // Botons
    { cls: InteractiveButton, opts: { boardX: 282, boardY: 870,  boardWidth: 44,  boardHeight: 44,  mqttName: 'btIO0' } },
    { cls: InteractiveButton, opts: { boardX: 285, boardY: 965,  boardWidth: 44,  boardHeight: 44,  mqttName: 'btI34' } },
    { cls: InteractiveButton, opts: { boardX: 285, boardY: 1060, boardWidth: 44,  boardHeight: 44,  mqttName: 'btI35' } },
    // LEDs (amb etiqueta GPIO)
    { cls: InteractiveLed, opts: { boardX: 670, boardY: 840,  boardWidth: 30, boardHeight: 50, color: 'white',  mqttName: 'ledW', gpioLabel: LED_GPIO_LABELS.ledW } },
    { cls: InteractiveLed, opts: { boardX: 670, boardY: 912,  boardWidth: 30, boardHeight: 50, color: 'red',    mqttName: 'ledR', gpioLabel: LED_GPIO_LABELS.ledR } },
    { cls: InteractiveLed, opts: { boardX: 670, boardY: 984,  boardWidth: 30, boardHeight: 50, color: 'yellow', mqttName: 'ledY', gpioLabel: LED_GPIO_LABELS.ledY } },
    { cls: InteractiveLed, opts: { boardX: 670, boardY: 1056, boardWidth: 30, boardHeight: 50, color: 'lime',   mqttName: 'ledG', gpioLabel: LED_GPIO_LABELS.ledG } },
    // Sensors
    { cls: InteractiveLdr,    opts: { boardX: 337, boardY: 1105, boardWidth: 70,  boardHeight: 70  } },
    { cls: InteractiveBme280, opts: { boardX: 385, boardY: 300,  boardWidth: 150, boardHeight: 150 } },
    // OLED
    { cls: InteractiveOled,   opts: { boardX: 354, boardY: 540,  boardWidth: 346, boardHeight: 173 } },
];

const boardImage     = $('board-image');
const boardContainer = $('board-container');
let IMG_NATIVE_W = 0;
let IMG_NATIVE_H = 0;

function createBoardComponents() {
    boardComponents.forEach(c => c.destroy());
    boardComponents = [];

    BOARD_COMPONENTS_DEFS.forEach(def => {
        const opts = { ...def.opts, mqttController: simulatorTransport };
        if (def.cls === InteractiveBme280 || def.cls === InteractiveLdr) {
            opts.settingsManager = settingsManager;
        }
        const comp = new def.cls(boardContainer, opts);
        boardComponents.push(comp);
    });

    recalculatePositions();
}

function recalculatePositions() {
    if (!IMG_NATIVE_W || !IMG_NATIVE_H) return;

    const containerW = boardContainer.clientWidth;
    const containerH = boardContainer.clientHeight;

    const imageScale = Math.min(containerW / IMG_NATIVE_W, containerH / IMG_NATIVE_H);
    const renderedW  = IMG_NATIVE_W * imageScale;
    const renderedH  = IMG_NATIVE_H * imageScale;
    const xOffset    = (containerW - renderedW) / 2;
    const yOffset    = (containerH - renderedH) / 2;

    boardComponents.forEach(c => c.updatePosition(imageScale, xOffset, yOffset));
}

function onBoardImageLoaded() {
    IMG_NATIVE_W = boardImage.naturalWidth;
    IMG_NATIVE_H = boardImage.naturalHeight;
    createBoardComponents();
}

if (boardImage.complete && boardImage.naturalWidth > 0) {
    onBoardImageLoaded();
} else {
    boardImage.addEventListener('load', onBoardImageLoaded);
    boardImage.addEventListener('error', () => {
        compileStatus.textContent = T.errBoardImage;
    });
}

window.addEventListener('resize', recalculatePositions);

// ─── Crida inicial: processa el hash si n'hi ha ───
initFromHash();
</script>
</body>
</html>

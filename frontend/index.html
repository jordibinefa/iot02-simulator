<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ESP32 Simulator — IoT-02</title>
</head>
<body>
<script>
// Detecta l'idioma preferit del navegador i redirigeix al fitxer corresponent.
// Regles:
//   ca / ca-* → index.ca.html
//   es-CA      → index.ca.html  (castellà de Catalunya → català per defecte)
//   es / es-*  → index.es.html
//   qualsevol altre → index.en.html
(function () {
    const langs = navigator.languages || [navigator.language || 'en'];
    let target = 'en';
    for (const l of langs) {
        const lc = l.toLowerCase();
        if (lc.startsWith('ca'))    { target = 'ca'; break; }
        if (lc === 'es-ca')         { target = 'ca'; break; }
        if (lc.startsWith('es'))    { target = 'es'; break; }
    }
    location.replace('index.' + target + '.html');
}());
</script>
</body>
</html>
